server:
  port: 8080

  error:
    include-stacktrace: never
    include-message: never

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 3s

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              # - "http://localhost:5173"
              - "https://user-app-theta-seven.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # server:
      # webflux:

      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY, GATEWAY_TIMEOUT
            methods: GET

      routes:
        - id: auth
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: user
          uri: lb://user-service
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: serviceCircuit
                # fallbackUri: forward:/fallback/user

        - id: order
          uri: lb://order-service
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=0
            - RemoveRequestHeader=Cookie
            - name: CircuitBreaker
              args:
                name: serviceCircuit

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public.pem

eureka:
  client:
    service-url:
      # defaultZone: http://localhost:8761/eureka/ # LOCAL
      defaultZone: ${URL_EUREKA:http://eureka-server:8761/eureka/}
  instance:
    # hostname: api-gateway # Nombre del servicio para Eureka
    prefer-ip-address: true # En Docker, es mejor usar la IP para evitar problemas de resolución de nombres

resilience4j:
  circuitbreaker:
    instances:
      serviceCircuit:
        slidingWindowSize: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 5s
        waitDurationInOpenState: 5s
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{X-Correlation-Id}]"

  level:
    org.springframework.security: DEBUG
    reactor.netty.http.client: DEBUG
